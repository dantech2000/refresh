name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Above the two 900s (15m) check-waits below so they can resolve first.
    timeout-minutes: 20
    if: github.actor == 'dependabot[bot]'

    steps:
      # Authoritative metadata from Dependabot itself — the previous title regex
      # let major bumps through because `.*` swallowed the major component. (REF-60)
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine eligibility (patch/minor only)
        id: check
        run: |
          update_type="${{ steps.meta.outputs.update-type }}"
          echo "update-type: $update_type"
          if [[ "$update_type" == "version-update:semver-patch" || \
                "$update_type" == "version-update:semver-minor" ]]; then
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          else
            echo "eligible=false" >> "$GITHUB_OUTPUT"
          fi

      # Both the build/test gate AND the lint gate must pass — a PR that breaks
      # the build/tests but passes lint must NOT auto-merge. (REF-60)
      - name: Wait for Test check
        if: steps.check.outputs.eligible == 'true'
        uses: fountainhead/action-wait-for-check@5a908a24814494009c4bb27c242ea38c93c593be # v1.2.0
        id: wait-test
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "Run go test"
          ref: ${{ github.event.pull_request.head.sha }}
          timeoutSeconds: 900

      - name: Wait for Lint check
        if: steps.check.outputs.eligible == 'true'
        uses: fountainhead/action-wait-for-check@5a908a24814494009c4bb27c242ea38c93c593be # v1.2.0
        id: wait-lint
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "Run golangci-lint"
          ref: ${{ github.event.pull_request.head.sha }}
          timeoutSeconds: 900

      - name: Auto-merge Dependabot PR
        if: |
          steps.check.outputs.eligible == 'true' &&
          steps.wait-test.outputs.conclusion == 'success' &&
          steps.wait-lint.outputs.conclusion == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Test + Lint passed. Auto-merging Dependabot PR..."
          gh pr merge ${{ github.event.pull_request.number }} --auto --squash --delete-branch

      - name: Comment on non-eligible PR
        if: steps.check.outputs.eligible == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "⚠️ This Dependabot PR requires manual review (major version update or non-version change)."
