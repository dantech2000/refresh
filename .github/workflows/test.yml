name: Test

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

# Cancel superseded runs when new commits are pushed to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Run go test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          # Resolve the Go version from go.mod so CI never drifts from the
          # module's declared toolchain.
          go-version-file: go.mod
          cache: true

      # We intentionally do NOT run a separate non-race `go build ./...`. Go's
      # build cache keys on -race, so a non-race build shares zero cached
      # compilation with the race test below — it just compiles the (large)
      # AWS-SDK/k8s tree a second time. Compilation is fully covered by the
      # race steps: `go run -race . gen-docs` builds the main binary, and
      # `go test -race ./...` compiles every package (even test-less ones).
      # `go vet` is covered by golangci-lint's govet linter (lint.yml). (REF-135)

      - name: Docs command reference is up to date
        # `-race` so this shares one race compile of the dependency tree with the
        # Test step's cache, instead of adding a separate non-race compile pass.
        run: |
          go run -race . gen-docs --out docs/reference
          if ! git diff --quiet -- docs/reference; then
            echo "::error::docs/reference is stale vs the CLI tree. Run 'task docs:gen' and commit."
            git --no-pager diff -- docs/reference
            exit 1
          fi

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          files: coverage.out
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  govulncheck:
    name: Run govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...
