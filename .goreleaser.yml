# GoReleaser config for the 'refresh' CLI tool
# See https://goreleaser.com/customization/ for full docs

version: 2

dist: dist

builds:
  - id: refresh
    main: ./main.go
    binary: refresh
    # Reproducible builds: strip local paths and pin the build timestamp to the
    # commit so the same source produces byte-identical binaries. (REF-74)
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/dantech2000/refresh/internal/commands.version={{.Version}}
      - -X github.com/dantech2000/refresh/internal/commands.commit={{.ShortCommit}}
      - -X github.com/dantech2000/refresh/internal/commands.buildDate={{.Date}}
    env:
      - CGO_ENABLED=0

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

# Software Bill of Materials per archive (syft). (REF-74)
sboms:
  - id: archive
    artifacts: archive

# Keyless signing of the checksums file via cosign + the GitHub OIDC provider.
# No long-lived keys: the signature/certificate are published as release
# artifacts and verifiable with `cosign verify-blob`. (REF-74)
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

changelog:
  sort: desc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

homebrew_casks:
  - name: refresh
    repository:
      owner: dantech2000
      name: homebrew-tap
      branch: main
      token: "{{ .Env.GH_PAT }}"
    directory: Casks
    homepage: "https://github.com/dantech2000/refresh"
    description: "Manage and monitor AWS EKS node groups using your local kubeconfig and AWS credentials"
    license: "MIT"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/refresh"]
          end

release:
  github:
    owner: dantech2000
    name: refresh
